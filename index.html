        *{

        .hero {

  padding: 0 20px;

}


        h1 {
  font-size: 2.5rem; /* Scales better on mobile */

  word-wrap: break-word; 
}


        p{
            margin-top:20px;

        a{

            border-radius:50px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            transform:scale(1.08);
        }
          /* ... your existing CSS styles like a:hover are up here ... */
  a:hover {
    transform: scale(1.08);
  }

  /* PASTE POINT 1 RIGHT HERE: */
  .gallery {
    padding: 40px 20px;
    background: #0b0b0b;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .gallery-item {
  width: 100%;
  height: auto; /* Let the height adapt naturally so it doesn't crop */
  display: block;
  border-radius: 8px;
  background: #1a1a1a;
  transition: transform 0.3s ease;
}
  .gallery-item:hover {
    transform: scale(1.03);
  }
