<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rawpixels</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0b0b0b;
            color:white;
        }

        .hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: linear-gradient(135deg, #000, #1a1a1a);
  /* Add these two lines right here: */
  padding: 0 20px;
  box-sizing: border-box;
}


        h1 {
  font-size: 2.5rem; /* Scales better on mobile */
  max-width: 100%;   /* Prevents it from extending past the screen */
  text-align: center;
  word-wrap: break-word; 
}


        p{
            margin-top:20px;
            font-size:20px;
            color:#bdbdbd;
        }

        a{
            margin-top:40px;
            padding:15px 35px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:50px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            transform:scale(1.08);
        }
    </style>
</head>

<body>

<section class="hero">

<h1>RAWPIXELS</h1>

<p>Photography • Graphic Design • Visual Storytelling</p>

<a href="#">View Portfolio</a>

</section>

</body>
</html>
