<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rawpixels</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0b0b0b;
            color:white;
        }

        .hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: linear-gradient(135deg, #000, #1a1a1a);
  /* Add these two lines right here: */
  padding: 0 20px;
  box-sizing: border-box;
}


        h1 {
  font-size: 2.5rem; /* Scales better on mobile */
  max-width: 100%;   /* Prevents it from extending past the screen */
  text-align: center;
  word-wrap: break-word; 
}


        p{
            margin-top:20px;
            font-size:20px;
            color:#bdbdbd;
        }

        a{
            margin-top:40px;
            padding:15px 35px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:50px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            transform:scale(1.08);
        }
          /* ... your existing CSS styles like a:hover are up here ... */
  a:hover {
    transform: scale(1.08);
  }

  /* PASTE POINT 1 RIGHT HERE: */
  .gallery {
    padding: 40px 20px;
    background: #0b0b0b;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .gallery-item {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 8px;
    background: #1a1a1a;
    transition: transform 0.3s ease;
  }
  .gallery-item:hover {
    transform: scale(1.03);
  }

</style> <!-- This is line 56 -->

    </style>
</head>

<body>

<section class="hero">

<h1>RAWPIXELS</h1>

<p>Photography • Graphic Design • Visual Storytelling</p>

<a href="#">View Portfolio</a>

</section>
<section class="gallery">
  <div class="gallery-grid">
    <img src="https://picsum.photos/600/600?random=1" alt="Photography 1" class="gallery-item">
    <img src="https://picsum.photos/600/600?random=2" alt="Photography 2" class="gallery-item">
    <img src="https://picsum.photos/600/600?random=3" alt="Photography 3" class="gallery-item">
    <img src="https://picsum.photos/600/600?random=4" alt="Photography 4" class="gallery-item">
  </div>
</section>


</body>
</html>
